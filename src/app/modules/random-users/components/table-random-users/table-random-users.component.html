<table class="table table-striped">

  <thead>
    <tr>
      <th>Foto</th>
      <th>Nombre</th>
      <th>Email</th>
      <th>Teléfono</th>
      <th>País</th>
    </tr>
  </thead>

  <tbody>

    <tr *ngFor="let user of users">

      <td>
        <img [src]="user.picture.thumbnail" width="40">
      </td>

      <td>
        {{user.name.first}} {{user.name.last}}
      </td>

      <td>
        {{user.email}}
      </td>

      <td>
        {{user.phone}}
      </td>

      <td>
        {{user.location.country}}
      </td>

    </tr>

  </tbody>

</table>
